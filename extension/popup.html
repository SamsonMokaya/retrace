<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 280px; padding: 12px; font-family: system-ui, sans-serif; font-size: 13px; margin: 0; }
    h1 { font-size: 16px; margin: 0 0 8px 0; }
    p { color: #666; margin: 0 0 12px 0; }
    input { width: 100%; box-sizing: border-box; padding: 6px 8px; margin-bottom: 8px; }
    label { display: block; font-size: 11px; color: #888; margin-bottom: 2px; }
  </style>
</head>
<body>
  <h1>Retrace</h1>
  <p>Page visits are sent automatically. To save a highlight: select text, then press <b>Ctrl+Shift+H</b> (Mac: <b>Cmd+Shift+H</b>) or right-click → <b>Save to Retrace</b>.</p>
  <label for="apiUrl">Backend API URL</label>
  <input type="text" id="apiUrl" placeholder="http://localhost:8000" />
  <script src="popup.js"></script>
</body>
</html>
